  .ptbar b{color:var(--good);font-size:14px}
  .bar{height:6px;background:#eee7d6;border-radius:6px;overflow:hidden;margin:0 0 15px}

  .panel-tag{display:inline-block;background:var(--coral);color:#fff;font-size:11px;font-weight:800;letter-spacing:.6px;padding:4px 10px;border-radius:6px;margin-bottom:8px}
  .panel-topic{font-size:19px;font-weight:800;margin:0 0 10px;color:var(--navy);text-align:center}

  .figwrap{background:#f7f6f1;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;margin:0 0 14px}
  .prompt{font-size:15.5px;font-weight:800;line-height:1.5;margin:0 0 14px;color:var(--navy)}

  .credit b{color:#c3ccdd}
.bigreact{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:40;pointer-events:none;opacity:0;text-align:center;padding:16px}
.bigreact.show{animation:brIn 1.5s cubic-bezier(.2,.8,.3,1) forwards}
.bigreact.bad{background:rgba(196,57,43,.16)}
.bigreact.good{background:rgba(47,143,91,.15)}

.bigreact.bad .br-title{color:#c4392b;text-shadow:0 5px 0 rgba(140,40,28,.22)}
.bigreact.good .br-title{color:#2f8f5b;text-shadow:0 5px 0 rgba(35,110,60,.18)}
.br-sub{font-size:27px;font-weight:800;margin-top:12px;max-width:90%}
.bigreact.bad .br-sub{color:#8a2f22}
.bigreact.good .br-sub{color:#237a45}
@keyframes brIn{0%{opacity:0;transform:scale(.35) rotate(-4deg)}12%{opacity:1;transform:scale(1.14) rotate(0)}24%{transform:scale(1) rotate(-3deg)}34%{transform:scale(1) rotate(3deg)}44%{transform:scale(1) rotate(-2deg)}54%{transform:rotate(0)}82%{opacity:1}100%{opacity:0;transform:scale(1.06)}}
</style>

function beep(f,dur,ty,vol,when){const c=ac();if(!c)return;const t=(when||0)+c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type=ty||'sine';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.14,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g).connect(c.destination);o.start(t);o.stop(t+dur+0.03);}

function shake(el){try{if(el&&el.animate){el.animate([{transform:'translateX(0)'},{transform:'translateX(-7px)'},{transform:'translateX(7px)'},{transform:'translateX(0)'}],{duration:240});}}catch(e){}}
function reactPop(icon,text,cls){const c=document.querySelector('.card');if(!c)return;const d=document.createElement('div');d.className='react show'+(cls?' '+cls:'');d.innerHTML=icon+'<span>'+text+'</span>';c.appendChild(d);setTimeout(()=>{if(d&&d.parentNode)d.parentNode.removeChild(d);},1200);}
const okIcon='<svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#e7f3ea" stroke="#2f8f5b" stroke-width="2"/><path d="M8 12l3 3 5-6" fill="none" stroke="#2f8f5b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const RIC=['<svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#fbeae7" stroke="#c4392b" stroke-width="2"/><path d="M8 8l8 8M16 8l-8 8" stroke="#c4392b" stroke-width="2.2" stroke-linecap="round"/></svg>','<svg width="24" height="24" viewBox="0 0 24 24"><path d="M6 16h12l-1.5-2v-4a4.5 4.5 0 00-9 0v4z" fill="#fbeae7" stroke="#c4392b" stroke-width="2" stroke-linejoin="round"/><path d="M10.4 18.5a1.7 1.7 0 003.2 0" stroke="#c4392b" stroke-width="2" fill="none"/></svg>'];
const WMSG=["Alarm çaldı! Yanlış.","Cızzz! Olmadı.","Yanlış — puan düştü!","Bir daha dene!"];
let wrongIdx=0;
const CC={mint:['#e7f3ea','#2f7d3a'],rose:['#fbe9ef','#b04c74'],lav:['#ecebf7','#5a4a94'],cream:['#fcf4dd','#b07d0a']};
function figCause(fa,fu){return '<svg class="fig" width="230" height="165" viewBox="0 0 230 165">'
  +'<path d="M45 34 V145 H165 V34" fill="none" stroke="#5F5E5A" stroke-width="2.5"/><rect x="47" y="50" width="116" height="93" fill="#bfe0f2" opacity="0.7"/><path d="M47 50 q10 -5 19 0 t19 0 t19 0 t19 0 t19 0" fill="none" stroke="#378add" stroke-width="2"/>'
  +'<rect x="83" y="76" width="44" height="42" fill="#c98a5a" stroke="#8a5a1e" stroke-width="2"/>'
  +'<line x1="105" y1="140" x2="105" y2="122" stroke="#2f8f5b" stroke-width="5"/><path d="M98 126 L105 114 L112 126 Z" fill="#2f8f5b"/>'
  +'<line x1="105" y1="52" x2="105" y2="66" stroke="#E5533C" stroke-width="4"/><path d="M100 62 L105 72 L110 62 Z" fill="#E5533C"/>'
  +'<text x="173" y="132" font-size="11.5" font-weight="bold" fill="#2f8f5b" font-family="sans-serif">alt: '+fa+'N ↑</text>'
  +'<text x="173" y="60" font-size="11.5" font-weight="bold" fill="#E5533C" font-family="sans-serif">üst: '+fu+'N ↓</text></svg>';}
function figSubmerged(){return '<svg class="fig" width="180" height="150" viewBox="0 0 180 150"><path d="M40 26 V135 H150 V26" fill="none" stroke="#5F5E5A" stroke-width="2.5"/><rect x="42" y="44" width="106" height="91" fill="#bfe0f2" opacity="0.7"/><path d="M42 44 q9 -5 18 0 t18 0 t18 0 t18 0 t18 0" fill="none" stroke="#378add" stroke-width="2"/><rect x="72" y="72" width="46" height="42" fill="#c98a5a" stroke="#8a5a1e" stroke-width="2"/><line x1="95" y1="70" x2="95" y2="46" stroke="#2f8f5b" stroke-width="5"/><path d="M88 50 L95 38 L102 50 Z" fill="#2f8f5b"/><text x="95" y="32" font-size="11.5" font-weight="bold" fill="#2f8f5b" text-anchor="middle" font-family="sans-serif">kaldırma</text></svg>';}
function figLevels(){return '<svg class="fig" width="190" height="165" viewBox="0 0 190 165"><path d="M38 26 V148 H152 V26" fill="none" stroke="#5F5E5A" stroke-width="2.5"/><rect x="40" y="46" width="110" height="102" fill="#bfe0f2" opacity="0.7"/><path d="M40 46 q9 -5 18 0 t18 0 t18 0 t18 0 t18 0" fill="none" stroke="#378add" stroke-width="2"/>'
  +'<rect x="56" y="35" width="26" height="22" fill="#e6c185" stroke="#8a5a1e" stroke-width="1.6"/><text x="69" y="31" font-size="12" font-weight="bold" fill="#1B2A4A" text-anchor="middle" font-family="sans-serif">K</text>'
  +'<rect x="104" y="82" width="26" height="22" fill="#9aa3b2" stroke="#5F5E5A" stroke-width="1.6"/><text x="117" y="78" font-size="12" font-weight="bold" fill="#1B2A4A" text-anchor="middle" font-family="sans-serif">L</text>'
  +'<rect x="62" y="124" width="26" height="22" fill="#5b5e64" stroke="#3d3d3a" stroke-width="1.6"/><text x="75" y="120" font-size="12" font-weight="bold" fill="#1B2A4A" text-anchor="middle" font-family="sans-serif">M</text></svg>';}
function figFloat(){return '<svg class="fig" width="190" height="150" viewBox="0 0 190 150"><path d="M40 30 V128 H150 V30" fill="none" stroke="#5F5E5A" stroke-width="2.5"/><rect x="42" y="60" width="106" height="66" fill="#bfe0f2" opacity="0.7"/><path d="M42 60 q9 -5 18 0 t18 0 t18 0 t18 0 t18 0" fill="none" stroke="#378add" stroke-width="2"/><rect x="76" y="48" width="38" height="26" fill="#e6c185" stroke="#8a5a1e" stroke-width="1.8"/><text x="95" y="44" font-size="11" font-weight="bold" fill="#1B2A4A" text-anchor="middle" font-family="sans-serif">yüzen cisim</text><circle cx="60" cy="92" r="1.7" fill="#fff"/><circle cx="122" cy="102" r="1.7" fill="#fff"/><circle cx="92" cy="115" r="1.7" fill="#fff"/><circle cx="132" cy="86" r="1.7" fill="#fff"/><circle cx="70" cy="110" r="1.7" fill="#fff"/><text x="95" y="143" font-size="10.5" fill="#5B6472" text-anchor="middle" font-family="sans-serif">suya tuz eklenince?</text></svg>';}
function figTwo(){return '<svg class="fig" width="200" height="150" viewBox="0 0 200 150">'+'<text x="100" y="15" font-size="10.5" fill="#5B6472" text-anchor="middle" font-family="sans-serif">aynı hacim · ikisi de tamamen batık</text>'+'<path d="M34 30 V130 H166 V30" fill="none" stroke="#5F5E5A" stroke-width="2.5"/>'+'<rect x="36" y="50" width="128" height="80" fill="#bfe0f2" opacity="0.7"/>'+'<path d="M36 50 q10 -5 20 0 t20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#378add" stroke-width="2"/>'+'<rect x="58" y="74" width="34" height="34" fill="#e6c185" stroke="#8a5a1e" stroke-width="1.8"/>'+'<rect x="110" y="74" width="34" height="34" fill="#8a9098" stroke="#4a4e54" stroke-width="1.8"/>'+'<text x="75" y="124" font-size="10" fill="#5B6472" text-anchor="middle" font-family="sans-serif">hafif cisim</text>'+'<text x="127" y="124" font-size="10" fill="#5B6472" text-anchor="middle" font-family="sans-serif">ağır cisim</text></svg>';}
function figHtml(f){if(!f)return '';if(f.t==='cause')return figCause(f.fa,f.fu);if(f.t==='submerged')return figSubmerged();if(f.t==='levels')return figLevels();if(f.t==='float')return figFloat();if(f.t==='two')return figTwo();return '';}
function renderSetup(){chipEl.textContent="Kurulum";drawSetup();}
function drawSetup(){
  let names='';for(let i=0;i<N;i++){names+='<div class="nmrow"><span class="d" style="background:'+GC[i]+'">'+(i+1)+'</span><input class="nm" id="nm'+i+'" value="'+((groups[i]&&groups[i].name)||('Grup '+(i+1)))+'" maxlength="16" /></div>';}
  stageEl.innerHTML='<div class="center"><div class="big">Kaldırma Kuvveti Turnuvası</div><p>Bu oda, <b>Timur Hoca Grup Yarışı</b> setinin <b>deneme sürümüdür</b> — 13 odadan yalnızca biri. Sınıfı gruplara böl, isimleri gir; 12 soru sırayla gelir — doğru puan kazandırır, yanlış kaybettirir. Bakalım kim <b>şampiyon</b> olacak!</p><div style="font-size:13px;font-weight:700;color:var(--muted);margin-top:6px">Kaç grup?</div><div class="steprow"><button class="stepbtn" id="minus">−</button><div class="stepval" id="cnt">'+N+'</div><button class="stepbtn" id="plus">+</button></div><div class="names" id="names">'+names+'</div><button class="start" id="startBtn">Yarışı Başlat</button></div>';
  document.getElementById('plus').onclick=()=>{if(N<6){saveNames();N++;drawSetup();}};
  document.getElementById('minus').onclick=()=>{if(N>2){saveNames();N--;drawSetup();}};
  document.getElementById('startBtn').onclick=()=>{saveNames();ac();startGame();};
}
function saveNames(){for(let i=0;i<N;i++){const el=document.getElementById('nm'+i);if(el)groups[i]={name:el.value.trim()||('Grup '+(i+1)),score:0};}}
function startGame(){groups=groups.slice(0,N);for(let i=0;i<N;i++){if(!groups[i])groups[i]={name:'Grup '+(i+1),score:0};groups[i].score=0;}stage=0;renderDoor();}
function sboardHtml(cur){let s='<div class="sboard">';groups.forEach((g,i)=>{s+='<div class="gchip'+(i===cur?' cur':'')+'"><span class="dot" style="background:'+GC[i]+'">'+(i+1)+'</span>'+g.name+' <span class="sc">'+g.score+'</span></div>';});return s+'</div>';}
function barHtml(){const pct=Math.round(stage/D.length*100);return '<div class="bar"><div style="width:'+pct+'%"></div></div>';}
function renderDoor(){
  const q=D[stage],turn=stage%N;doorPt=DOORPT;
  chipEl.textContent="Soru "+(stage+1)+" / "+D.length;
  let itemsHtml='';
  if(q.items){itemsHtml='<ul class="items" id="items">';q.items.forEach(it=>{const cc=CC[it.c]||CC.mint;itemsHtml+='<li><span class="tx">'+it.t+'</span><span class="tag" style="background:'+cc[0]+';color:'+cc[1]+'">'+it.tag+'</span></li>';});itemsHtml+='</ul>';}
  const inputHtml=q.type==='word'?'<input class="ans" id="ans" type="text" autocomplete="off" placeholder="Cevabın" />':'<input class="ans" id="ans" type="number" inputmode="numeric" placeholder="Cevabın" />';
  stageEl.innerHTML=sboardHtml(turn)+'<div class="turnbar">Sıra: <b>'+groups[turn].name+'</b></div>'+barHtml()
    +'<div class="ptbar">Bu soru: <b id="pt">'+doorPt+'</b> puan</div>'
    +'<div style="text-align:center"><span class="panel-tag">'+q.tag+'</span></div><div class="panel-topic">'+q.topic+'</div>'
    +(q.fig?'<div class="figwrap">'+figHtml(q.fig)+'</div>':'')
    +'<div class="prompt">'+q.prompt+'</div>'+itemsHtml
    +'<div class="inrow">'+inputHtml+'<button class="go" id="go">Cevapla</button></div>'
    +'<div class="row2"><div class="fb" id="fb"></div><button class="hintbtn" id="hb">İpucu</button></div>'
    +'<div class="hint" id="hint">'+q.hint+'</div><div class="teach" id="teach">'+q.teach+'</div>';
  const ans=document.getElementById('ans'),fb=document.getElementById('fb'),go=document.getElementById('go');
  document.getElementById('hb').onclick=()=>document.getElementById('hint').classList.toggle('on');
  function submit(){
    let ok=false;
    if(q.type==='word'){const nm=s=>(s||'').trim().toLocaleUpperCase('tr').replace(/\s+/g,'').replace(/[İIı]/g,'I').replace(/(KUVVETI|KUVVET|BASINCI|BÜYÜKLÜK)$/,'');const v=nm(ans.value);ok=v.length>0&&q.answer.some(a=>{const A=nm(a);return A===v||(v.length>=4&&A.startsWith(v));});}
    else{const v=parseInt(ans.value,10);if(isNaN(v)){fb.className='fb bad';fb.textContent='Bir sayı gir.';return;}ok=(v===q.answer);}
    if(ok){groups[turn].score+=doorPt;fb.className='fb good';fb.textContent='Doğru! +'+doorPt+' puan → '+groups[turn].name;go.disabled=true;ans.disabled=true;const it=document.getElementById('items');if(it)it.classList.add('reveal');reactPop(okIcon,'+'+doorPt+' puan!','good');sfxCorrect();document.getElementById('teach').classList.add('on');setTimeout(()=>{stage++;(stage>=D.length)?renderResult():renderDoor();},1600);}
    else{doorPt=Math.max(FLOOR,doorPt-PEN);const pe=document.getElementById('pt');if(pe)pe.textContent=doorPt;const mm=WMSG[wrongIdx%WMSG.length];wrongIdx++;fb.className='fb bad';fb.textContent=mm+' ('+groups[turn].name+' hâlâ oynuyor)';reactPop(RIC[wrongIdx%2],'−'+PEN+' puan','');sfxWrong();shake(document.querySelector('.card'));}
  }
  go.onclick=submit;ans.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});ans.focus();
}
function renderResult(){
  chipEl.textContent="Sonuç";sfxWin();
  const sorted=groups.map((g,i)=>({g,i})).sort((a,b)=>b.g.score-a.g.score);
  const top=sorted[0].g.score,winners=sorted.filter(x=>x.g.score===top),rk=['🥇','🥈','🥉','4.','5.','6.'];
  let li='';sorted.forEach((x,idx)=>{li+='<li class="'+(x.g.score===top?'win':'')+'"><span class="rk">'+rk[idx]+'</span><span class="dot" style="width:20px;height:20px;border-radius:50%;background:'+GC[x.i]+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">'+(x.i+1)+'</span><span class="nm">'+x.g.name+'</span><span class="pt">'+x.g.score+' puan</span></li>';});
  const title=winners.length>1?('Beraberlik! '+winners.map(w=>w.g.name).join(' & ')):(sorted[0].g.name+' kazandı!');
  stageEl.innerHTML='<div class="center"><div style="font-size:44px">🏆</div><div class="big">'+title+'</div><p>Kaldırma kuvveti yarışı bitti. İşte puanlar:</p></div><ul class="result">'+li+'</ul><div style="background:#FCF4DD;border:1.5px solid #EEB211;border-radius:14px;padding:14px;margin:14px 2px;text-align:left"><div style="font-size:15px;font-weight:800;color:#1B2A4A;margin-bottom:6px">🎓 Beğendin mi? Bu yalnızca 1 oda!</div><div style="font-size:13px;color:#5B6472;line-height:1.55;margin-bottom:10px">Tam sette <b>tüm 9. sınıf fizik · 13 oda</b> var — grup yarışı modu, şekilli sorular, pro çizimler ve anlık geri bildirim. Okulunuzun ve kendi adınızla da verilebilir.</div><div style="display:flex;gap:8px;flex-wrap:wrap"><a href="https://wa.me/905425549386?text=Merhaba%20Timur%20Hoca%2C%20Grup%20Yar%C4%B1%C5%9F%C4%B1%20setini%20merak%20ediyorum." target="_blank" rel="noopener" style="flex:1;min-width:130px;text-align:center;text-decoration:none;font-weight:800;font-size:13px;padding:11px;border-radius:10px;background:#25D366;color:#fff">WhatsApp ile yaz</a><a href="https://instagram.com/benfizikyapamiyorum" target="_blank" rel="noopener" style="flex:1;min-width:130px;text-align:center;text-decoration:none;font-weight:800;font-size:13px;padding:11px;border-radius:10px;background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);color:#fff">Instagram</a></div></div><div class="center"><button class="replay" id="rp">Yeni Yarış</button></div>';
  document.getElementById('rp').onclick=()=>{renderSetup();};
}
renderSetup();

/* --- büyük tepki (bigReact) — reactPop override --- */
var BR_GOOD=["Süper!","Tam isabet!","Bravo!","İşte bu!","Harika!","Çok iyi!"];
function reactPop(icon,text,cls){var good=(cls==='good');var c=document.querySelector('.card');if(!c)return;var d=document.createElement('div');d.className='bigreact show '+(good?'good':'bad');var sub=good?(BR_GOOD[Math.floor(Math.random()*BR_GOOD.length)]+' '+(text||'')):((typeof WMSG!=='undefined'&&WMSG.length)?WMSG[Math.floor(Math.random()*WMSG.length)]:'Olmadı!');d.innerHTML='<div class="br-title">'+(good?'DOĞRU!':'YANLIŞ!')+'</div><div class="br-sub">'+sub+'</div>';c.appendChild(d);setTimeout(function(){if(d&&d.parentNode)d.parentNode.removeChild(d);},1500);}
</script>
