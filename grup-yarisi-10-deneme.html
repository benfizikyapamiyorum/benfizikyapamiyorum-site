function beep(f,dur,ty,vol,when){const c=ac();if(!c)return;const t=(when||0)+c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type=ty||'sine';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.14,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g).connect(c.destination);o.start(t);o.stop(t+dur+0.03);}

  s+='<circle cx="130" cy="44" r="2.6" fill="#1B2A4A"/><circle cx="180" cy="44" r="2.6" fill="#1B2A4A"/>';

  s+='<circle cx="95" cy="44" r="11" fill="#fff" stroke="#2f8f5b" stroke-width="2.2"/><text x="95" y="48" font-size="12" font-weight="bold" fill="#2f8f5b" text-anchor="middle" font-family="sans-serif">A</text>';
  s+='<rect x="138" y="37" width="34" height="14" fill="#fff" stroke="#1B2A4A" stroke-width="2.2"/><text x="155" y="31" font-size="12" font-weight="bold" fill="#E5533C" text-anchor="middle" font-family="sans-serif">R</text>';
  s+='<text x="95" y="68" font-size="9" fill="#2f8f5b" text-anchor="middle" font-family="sans-serif">ampermetre (seri)</text><text x="155" y="122" font-size="9" fill="#378add" text-anchor="middle" font-family="sans-serif">voltmetre (paralel)</text>';
  return s+'</svg>';}
function figVI(){var s='<svg class="fig" width="234" height="182" viewBox="0 0 234 182">';
  s+='<g stroke="#e7e3d6" stroke-width="1">';for(var i=1;i<=4;i++){var x=42+i*38;s+='<line x1="'+x+'" y1="18" x2="'+x+'" y2="152"/>';}for(var k=1;k<=3;k++){var y=152-k*40;s+='<line x1="42" y1="'+y+'" x2="196" y2="'+y+'"/>';}s+='</g>';
  s+='<line x1="42" y1="152" x2="206" y2="152" stroke="#1B2A4A" stroke-width="2.5"/><line x1="42" y1="152" x2="42" y2="16" stroke="#1B2A4A" stroke-width="2.5"/><path d="M206 152 l-7 -4 v8 z" fill="#1B2A4A"/><path d="M42 16 l-4 7 h8 z" fill="#1B2A4A"/>';
  s+='<text x="212" y="156" font-size="11" fill="#5B6472" font-family="sans-serif">I(A)</text><text x="22" y="14" font-size="11" fill="#5B6472" font-family="sans-serif">V(V)</text>';
  s+='<line x1="162" y1="34" x2="162" y2="152" stroke="#9cc3e8" stroke-width="1.4"/><line x1="42" y1="32" x2="160" y2="32" stroke="#9cc3e8" stroke-width="1.4"/><text x="162" y="167" font-size="11" font-weight="bold" fill="#378add" text-anchor="middle" font-family="sans-serif">3</text><text x="34" y="36" font-size="11" font-weight="bold" fill="#378add" text-anchor="end" font-family="sans-serif">18</text>';
  s+='<text x="104" y="146" font-size="10" fill="#5B6472" text-anchor="middle" font-family="sans-serif">eğim = direnç</text>';
  s+='<line x1="42" y1="152" x2="162" y2="32" stroke="#E5533C" stroke-width="3.5" stroke-linecap="round"/>';
  return s+'</svg>';}
function figWire(){var s='<svg class="fig" width="262" height="120" viewBox="0 0 262 120">';
  s+='<text x="131" y="20" font-size="11" font-weight="bold" fill="#a86a38" text-anchor="middle" font-family="sans-serif">telin cinsi (özdirenç ρ)</text>';
  s+='<rect x="28" y="52" width="12" height="16" fill="#9aa3b2"/><rect x="222" y="52" width="12" height="16" fill="#9aa3b2"/>';
  s+='<rect x="40" y="48" width="182" height="24" rx="4" fill="#d8935a" stroke="#a86a38" stroke-width="2"/>';
  s+='<line x1="18" y1="48" x2="18" y2="72" stroke="#2f8f5b" stroke-width="1.6"/><path d="M14 53 l4 -5 l4 5 M14 67 l4 5 l4 -5" fill="none" stroke="#2f8f5b" stroke-width="1.6"/><text x="8" y="63" font-size="10.5" font-weight="bold" fill="#2f8f5b">A</text>';
  s+='<line x1="40" y1="86" x2="222" y2="86" stroke="#378add" stroke-width="1.6"/><path d="M40 82 v8 M222 82 v8" stroke="#378add" stroke-width="1.6"/><text x="131" y="100" font-size="11" font-weight="bold" fill="#378add" text-anchor="middle" font-family="sans-serif">uzunluk (L)</text>';
  s+='<text x="131" y="116" font-size="10" fill="#5B6472" text-anchor="middle" font-family="sans-serif">R = ρ · L / A</text>';
  return s+'</svg>';}
function figHtml(f){if(!f)return '';if(f.t==='ohm')return figOhm();if(f.t==='vi')return figVI();if(f.t==='wire')return figWire();return '';}
function renderSetup(){chipEl.textContent="Kurulum";drawSetup();}
function drawSetup(){
  let names='';for(let i=0;i<N;i++){names+='<div class="nmrow"><span class="d" style="background:'+GC[i]+'">'+(i+1)+'</span><input class="nm" id="nm'+i+'" value="'+((groups[i]&&groups[i].name)||('Grup '+(i+1)))+'" maxlength="16" style="flex:1;font-size:15px;padding:9px 12px;border:2px solid #d8d2c0;border-radius:10px;outline:none;font-weight:700;color:#1B2A4A;width:100%" /></div>';}
  stageEl.innerHTML='<div class="center"><div class="big">Ohm Yasası Turnuvası</div><p>Bu oda, <b>Timur Hoca Grup Yarışı</b> setinin <b>10. sınıf deneme sürümüdür</b> — 12 odadan biri. Sınıfı gruplara böl, isimleri gir; 12 soru sırayla gelir. Anahtar formül: <b>V = I · R</b>, V-I grafiğinde <b>eğim = direnç</b>! En yüksek puanlı grup <b>şampiyon</b> olur.</p><div style="font-size:13px;font-weight:700;color:var(--muted);margin-top:6px">Kaç grup?</div><div class="steprow"><button class="stepbtn" id="minus">−</button><div class="stepval" id="cnt">'+N+'</div><button class="stepbtn" id="plus">+</button></div><div class="names" id="names">'+names+'</div><button class="start" id="startBtn">Yarışı Başlat</button></div>';
  document.getElementById('plus').onclick=()=>{if(N<6){saveNames();N++;drawSetup();}};
  document.getElementById('minus').onclick=()=>{if(N>2){saveNames();N--;drawSetup();}};
  document.getElementById('startBtn').onclick=()=>{saveNames();ac();startGame();};
}
function saveNames(){for(let i=0;i<N;i++){const el=document.getElementById('nm'+i);if(el)groups[i]={name:el.value.trim()||('Grup '+(i+1)),score:0};}}
function startGame(){groups=groups.slice(0,N);for(let i=0;i<N;i++){if(!groups[i])groups[i]={name:'Grup '+(i+1),score:0};groups[i].score=0;}stage=0;renderDoor();}
function sboardHtml(cur){let s='<div class="sboard">';groups.forEach((g,i)=>{s+='<div class="gchip'+(i===cur?' cur':'')+'"><span class="dot" style="background:'+GC[i]+'">'+(i+1)+'</span>'+g.name+' <span class="sc">'+g.score+'</span></div>';});return s+'</div>';}
function barHtml(){const pct=Math.round(stage/D.length*100);return '<div class="bar"><div style="width:'+pct+'%"></div></div>';}
function renderDoor(){
  const q=D[stage],turn=stage%N;doorPt=DOORPT;
  chipEl.textContent="Soru "+(stage+1)+" / "+D.length;
  let itemsHtml='';
  if(q.items){itemsHtml='<ul class="items" id="items">';q.items.forEach(it=>{const cc=(it.c==='rose')?['#fbe9ef','#b04c74']:['#e7f3ea','#2f7d3a'];itemsHtml+='<li><span class="tx">'+it.t+'</span><span class="tag" style="background:'+cc[0]+';color:'+cc[1]+'">'+it.tag+'</span></li>';});itemsHtml+='</ul>';}
  const inputHtml=q.type==='word'?'<input class="ans" id="ans" type="text" autocomplete="off" placeholder="Cevabın" />':'<input class="ans" id="ans" type="number" inputmode="numeric" placeholder="Cevabın" />';
  stageEl.innerHTML=sboardHtml(turn)+'<div class="turnbar">Sıra: <b>'+groups[turn].name+'</b></div>'+barHtml()
    +'<div class="ptbar">Bu soru: <b id="pt">'+doorPt+'</b> puan</div>'
    +'<div style="text-align:center"><span class="panel-tag">'+q.tag+'</span></div><div class="panel-topic">'+q.topic+'</div>'
    +(q.fig?'<div class="figwrap">'+figHtml(q.fig)+'</div>':'')
    +'<div class="prompt">'+q.prompt+'</div>'+itemsHtml
    +'<div class="inrow">'+inputHtml+'<button class="go" id="go">Cevapla</button></div>'
    +'<div class="row2"><div class="fb" id="fb"></div><button class="hintbtn" id="hb">İpucu</button></div>'
    +'<div class="hint" id="hint">'+q.hint+'</div><div class="teach" id="teach">'+q.teach+'</div>';
  const ans=document.getElementById('ans'),fb=document.getElementById('fb'),go=document.getElementById('go');
  document.getElementById('hb').onclick=()=>document.getElementById('hint').classList.toggle('on');
  function submit(){
    let ok=false;
    if(q.type==='word'){const nm=s=>(s||'').trim().toLocaleUpperCase('tr').replace(/\s+/g,'').replace(/[İIı]/g,'I').replace(/(BİRİMİ|BİRİM)$/,'');const v=nm(ans.value);ok=v.length>0&&q.answer.some(a=>{const A=nm(a);return A===v||(v.length>=4&&A.startsWith(v));});}
    else{const v=parseInt(ans.value,10);if(isNaN(v)){fb.className='fb bad';fb.textContent='Bir sayı gir.';return;}ok=(v===q.answer);}
    if(ok){groups[turn].score+=doorPt;fb.className='fb good';fb.textContent='Doğru! +'+doorPt+' puan → '+groups[turn].name;go.disabled=true;ans.disabled=true;const it=document.getElementById('items');if(it)it.classList.add('reveal');bigReact('good','DOĞRU!',RIGHT[Math.floor(Math.random()*RIGHT.length)]+' +'+doorPt+' puan');sfxCorrect();document.getElementById('teach').classList.add('on');setTimeout(()=>{stage++;(stage>=D.length)?renderResult():renderDoor();},1750);}
    else{doorPt=Math.max(FLOOR,doorPt-PEN);const pe=document.getElementById('pt');if(pe)pe.textContent=doorPt;const mm=WRONG[wrongIdx%WRONG.length];wrongIdx++;fb.className='fb bad';fb.textContent=mm+' ('+groups[turn].name+' hâlâ oynuyor, tekrar dene)';bigReact('bad','YANLIŞ!',mm);sfxWrong();shake(document.querySelector('.card'),true);}
  }
  go.onclick=submit;ans.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});ans.focus();
}
function renderResult(){
  chipEl.textContent="Sonuç";sfxWin();
  const sorted=groups.map((g,i)=>({g,i})).sort((a,b)=>b.g.score-a.g.score);
  const top=sorted[0].g.score,winners=sorted.filter(x=>x.g.score===top),rk=['🥇','🥈','🥉','4.','5.','6.'];
  let li='';sorted.forEach((x,idx)=>{li+='<li class="'+(x.g.score===top?'win':'')+'"><span class="rk">'+rk[idx]+'</span><span class="dot" style="width:20px;height:20px;border-radius:50%;background:'+GC[x.i]+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">'+(x.i+1)+'</span><span class="nm">'+x.g.name+'</span><span class="pt">'+x.g.score+' puan</span></li>';});
  const title=winners.length>1?('Beraberlik! '+winners.map(w=>w.g.name).join(' & ')):(sorted[0].g.name+' kazandı!');
  stageEl.innerHTML='<div class="center"><div style="font-size:44px">🏆</div><div class="big">'+title+'</div><p>Ohm yasası yarışı bitti! İşte puanlar:</p></div><ul class="result">'+li+'</ul><div style="background:#FCF4DD;border:1.5px solid #EEB211;border-radius:14px;padding:14px;margin:14px 2px;text-align:left"><div style="font-size:15px;font-weight:800;color:#1B2A4A;margin-bottom:6px">🎓 Beğendin mi? Bu yalnızca 1 oda!</div><div style="font-size:13px;color:#5B6472;line-height:1.55;margin-bottom:10px">Tam sette <b>10. sınıf fiziğin tamamı · 12 oda</b> var — Hareket, Enerji, Elektrik, Dalgalar. Grup yarışı modu, pro çizimler. Okulunuzun ve kendi adınızla da verilebilir.</div><div style="display:flex;gap:8px;flex-wrap:wrap"><a href="https://wa.me/905425549386?text=Merhaba%2C%2010.%20s%C4%B1n%C4%B1f%20Grup%20Yar%C4%B1%C5%9F%C4%B1%20tam%20setini%20almak%20istiyorum." target="_blank" rel="noopener" style="flex:1;min-width:130px;text-align:center;text-decoration:none;font-weight:800;font-size:13px;padding:11px;border-radius:10px;background:#25D366;color:#fff">WhatsApp ile yaz</a><a href="https://instagram.com/benfizikyapamiyorum" target="_blank" rel="noopener" style="flex:1;min-width:130px;text-align:center;text-decoration:none;font-weight:800;font-size:13px;padding:11px;border-radius:10px;background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);color:#fff">Instagram</a></div></div><div class="center"><button class="replay" id="rp">Yeni Yarış</button></div>';
  document.getElementById('rp').onclick=()=>{renderSetup();};
}
renderSetup();
</script>
